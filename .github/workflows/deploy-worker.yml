name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - trustlayer_worker.js
      - wrangler.toml

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
